services:

  # ── Ejecutores de pruebas (correr con: docker compose run --rm e2e-tests / api-tests) ──

  e2e-tests:
    build:
      context: ./playwright-tests
    container_name: qa_e2e_tests
    environment:
      - ORANGEHRM_URL=https://opensource-demo.orangehrmlive.com
      - ALLURE_RESULTS_DIR=/allure-results
    volumes:
      - allure-results:/allure-results
      - playwright-report:/app/playwright-report
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '4'
          memory: 2G
    shm_size: '2gb'
    restart: "no"
    networks:
      - qa-network

  api-tests:
    build:
      context: ./api-tests
    container_name: qa_api_tests
    environment:
      - WEATHER_API_KEY=${WEATHER_API_KEY:-REEMPLAZAR_CON_TU_KEY}
    volumes:
      - api-report:/app/api-report
    restart: "no"
    networks:
      - qa-network

  # Genera Plan_de_Pruebas_General.pdf
  pdf-generator:
    build:
      context: ./playwright-tests
    container_name: qa_pdf_generator
    volumes:
      - .:/work
    command: node /app/generate-pdf.js /work/plan-pruebas.html /work/Plan_de_Pruebas_General.pdf
    restart: "no"
    networks:
      - qa-network

  # Genera Casos_de_Prueba_Frontend.pdf
  casos-pdf-generator:
    build:
      context: ./playwright-tests
    container_name: qa_casos_pdf_generator
    volumes:
      - .:/work
    command: node /app/generate-pdf.js /work/casos-de-prueba.html /work/Casos_de_Prueba_Frontend.pdf
    restart: "no"
    networks:
      - qa-network

  # Genera Casos_de_Prueba_API_Clima.pdf
  api-casos-pdf-generator:
    build:
      context: ./playwright-tests
    container_name: qa_api_casos_pdf_generator
    volumes:
      - .:/work
    command: node /app/generate-pdf.js /work/api-casos-de-prueba.html /work/Casos_de_Prueba_API_Clima.pdf
    restart: "no"
    networks:
      - qa-network

  # Genera Casos_de_Prueba_OrangeHRM.xlsx desde playwright-report/results.json
  excel-generator:
    build:
      context: ./excel-generator
    container_name: qa_excel_generator
    volumes:
      - .:/work
      - playwright-report:/work/playwright-report
    restart: "no"
    networks:
      - qa-network

  # ── Servicios permanentes (correr con: docker compose up -d) ──

  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: qa_allure
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=5
      - KEEP_HISTORY=1
      - KEEP_HISTORY_LATEST=10
    ports:
      - "5050:5050"
    volumes:
      - allure-results:/app/allure-results
      - allure-report:/app/default-reports
    networks:
      - qa-network
    restart: unless-stopped

  bug-tracker:
    build:
      context: ./bug-tracker
    container_name: qa_bug_tracker
    ports:
      - "3000:3000"
    volumes:
      - bug-data:/app/data
    networks:
      - qa-network
    restart: unless-stopped

  report-server:
    image: nginx:1.25-alpine
    container_name: qa_report_server
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard:/var/www/dashboard:ro
      - playwright-report:/var/www/playwright-report:ro
      - api-report:/var/www/api-report:ro
    networks:
      - qa-network
    restart: unless-stopped

volumes:
  allure-results:
  allure-report:
  playwright-report:
  api-report:
  bug-data:

networks:
  qa-network:
    driver: bridge
